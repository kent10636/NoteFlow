services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: noteflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: noteflow
      POSTGRES_PASSWORD: noteflow
      POSTGRES_DB: noteflow
    ports:
      - "5432:5432"
    volumes:
      - noteflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteflow -d noteflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  noteflow_pgdata: