name: Sync repository homepage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  administration: write
  contents: read

jobs:
  sync-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Set production website URL
        env:
          TARGET_HOMEPAGE: https://noteflow-mu-three.vercel.app
        run: |
          current=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" \
            | jq -r '.homepage // empty')

          if [ "$current" = "$TARGET_HOMEPAGE" ]; then
            echo "Homepage already correct: $current"
            exit 0
          fi

          curl -fsSL -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" \
            -d "{\"homepage\":\"$TARGET_HOMEPAGE\"}"

          echo "Updated homepage: $current -> $TARGET_HOMEPAGE"