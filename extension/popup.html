<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>NoteFlow 剪藏</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 13px;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #111;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <label for="baseUrl">NoteFlow 地址</label>
    <input id="baseUrl" type="url" placeholder="https://noteflow-kent.vercel.app" />

    <label for="token">剪藏令牌</label>
    <input id="token" type="password" placeholder="在设置页生成" />

    <button id="save">保存配置</button>
    <button id="clip" style="margin-top: 8px">剪藏当前页面</button>
    <p id="status"></p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
